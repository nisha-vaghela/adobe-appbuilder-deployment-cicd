name: App Builder Deploy

on:
  push:
    branches:
      - stag
  workflow_dispatch:
    inputs:
      target_environment:
        description: "Select deployment environment"
        required: true
        default: "dev"
        type: choice
        options:
          - dev
          - stage

jobs:
  deploy-stage-on-stag-branch:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: stage
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Install Adobe I/O CLI
        run: npm install -g @adobe/aio-cli

      - name: Verify CLI
        run: aio --version

      - name: Prepare IMS scopes
        id: stage_scopes
        run: |
          RAW='${{ secrets.IMS_OAUTH_S2S_SCOPES }}'
          CSV="$(echo "$RAW" | tr -d '[]\" ' )"
          echo "csv=$CSV" >> "$GITHUB_OUTPUT"

      - name: Auth with Adobe IMS (CI)
        uses: adobe/aio-apps-action@3.3.0
        with:
          os: ubuntu-latest
          command: oauth_sts
          CLIENTID: ${{ secrets.IMS_OAUTH_S2S_CLIENT_ID }}
          CLIENTSECRET: ${{ secrets.IMS_OAUTH_S2S_CLIENT_SECRET }}
          TECHNICALACCOUNTID: ${{ secrets.AIO_IMS_TECHNICAL_ACCOUNT_ID }}
          TECHNICALACCOUNTEMAIL: ${{ secrets.AIO_IMS_TECHNICAL_ACCOUNT_EMAIL }}
          IMSORGID: ${{ secrets.IMS_OAUTH_S2S_ORG_ID }}
          SCOPES: ${{ steps.stage_scopes.outputs.csv }}

      - name: Deploy to Stage
        run: aio app deploy
        env:
          AIO_runtime_auth: ${{ secrets.AIO_RUNTIME_AUTH }}
          AIO_runtime_namespace: ${{ secrets.AIO_RUNTIME_NAMESPACE }}
          AIO_runtime_apihost: ${{ secrets.AIO_RUNTIME_APIHOST }}
          SERVICE_API_KEY: ${{ secrets.SERVICE_API_KEY }}
          IMS_OAUTH_S2S_CLIENT_ID: ${{ secrets.IMS_OAUTH_S2S_CLIENT_ID }}
          IMS_OAUTH_S2S_CLIENT_SECRET: ${{ secrets.IMS_OAUTH_S2S_CLIENT_SECRET }}
          IMS_OAUTH_S2S_ORG_ID: ${{ secrets.IMS_OAUTH_S2S_ORG_ID }}
          IMS_OAUTH_S2S_SCOPES: ${{ secrets.IMS_OAUTH_S2S_SCOPES }}
          BASE_URL: ${{ secrets.BASE_URL }}
          COMMERCE_CONSUMER_KEY: ${{ secrets.COMMERCE_CONSUMER_KEY }}
          COMMERCE_CONSUMER_SECRET: ${{ secrets.COMMERCE_CONSUMER_SECRET }}
          COMMERCE_ACCESS_TOKEN: ${{ secrets.COMMERCE_ACCESS_TOKEN }}
          COMMERCE_ACCESS_TOKEN_SECRET: ${{ secrets.COMMERCE_ACCESS_TOKEN_SECRET }}
          MESH_ID: ${{ secrets.MESH_ID }}
          MESH_ENDPOINT: ${{ secrets.MESH_ENDPOINT }}
          M247_BASE_URL: ${{ secrets.M247_BASE_URL }}
          M247_COMMERCE_CONSUMER_KEY: ${{ secrets.M247_COMMERCE_CONSUMER_KEY }}
          M247_COMMERCE_CONSUMER_SECRET: ${{ secrets.M247_COMMERCE_CONSUMER_SECRET }}
          M247_COMMERCE_ACCESS_TOKEN: ${{ secrets.M247_COMMERCE_ACCESS_TOKEN }}
          M247_COMMERCE_ACCESS_TOKEN_SECRET: ${{ secrets.M247_COMMERCE_ACCESS_TOKEN_SECRET }}
          NEW_RELIC_LICENSE_KEY: ${{ secrets.NEW_RELIC_LICENSE_KEY }}
          OBSERVABILITY_WEB_ACTION_URL: ${{ secrets.OBSERVABILITY_WEB_ACTION_URL }}

  deploy-manual:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment: ${{ inputs.target_environment }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Install Adobe I/O CLI
        run: npm install -g @adobe/aio-cli

      - name: Verify CLI
        run: aio --version

      - name: Prepare IMS scopes
        id: manual_scopes
        run: |
          RAW='${{ secrets.IMS_OAUTH_S2S_SCOPES }}'
          CSV="$(echo "$RAW" | tr -d '[]\" ' )"
          echo "csv=$CSV" >> "$GITHUB_OUTPUT"

      - name: Auth with Adobe IMS (CI)
        uses: adobe/aio-apps-action@3.3.0
        with:
          os: ubuntu-latest
          command: oauth_sts
          CLIENTID: ${{ secrets.IMS_OAUTH_S2S_CLIENT_ID }}
          CLIENTSECRET: ${{ secrets.IMS_OAUTH_S2S_CLIENT_SECRET }}
          TECHNICALACCOUNTID: ${{ secrets.AIO_IMS_TECHNICAL_ACCOUNT_ID }}
          TECHNICALACCOUNTEMAIL: ${{ secrets.AIO_IMS_TECHNICAL_ACCOUNT_EMAIL }}
          IMSORGID: ${{ secrets.IMS_OAUTH_S2S_ORG_ID }}
          SCOPES: ${{ steps.manual_scopes.outputs.csv }}

      - name: Deploy to selected environment
        run: aio app deploy
        env:
          AIO_runtime_auth: ${{ secrets.AIO_RUNTIME_AUTH }}
          AIO_runtime_namespace: ${{ secrets.AIO_RUNTIME_NAMESPACE }}
          AIO_runtime_apihost: ${{ secrets.AIO_RUNTIME_APIHOST }}
          SERVICE_API_KEY: ${{ secrets.SERVICE_API_KEY }}
          IMS_OAUTH_S2S_CLIENT_ID: ${{ secrets.IMS_OAUTH_S2S_CLIENT_ID }}
          IMS_OAUTH_S2S_CLIENT_SECRET: ${{ secrets.IMS_OAUTH_S2S_CLIENT_SECRET }}
          IMS_OAUTH_S2S_ORG_ID: ${{ secrets.IMS_OAUTH_S2S_ORG_ID }}
          IMS_OAUTH_S2S_SCOPES: ${{ secrets.IMS_OAUTH_S2S_SCOPES }}
          BASE_URL: ${{ secrets.BASE_URL }}
          COMMERCE_CONSUMER_KEY: ${{ secrets.COMMERCE_CONSUMER_KEY }}
          COMMERCE_CONSUMER_SECRET: ${{ secrets.COMMERCE_CONSUMER_SECRET }}
          COMMERCE_ACCESS_TOKEN: ${{ secrets.COMMERCE_ACCESS_TOKEN }}
          COMMERCE_ACCESS_TOKEN_SECRET: ${{ secrets.COMMERCE_ACCESS_TOKEN_SECRET }}
          MESH_ID: ${{ secrets.MESH_ID }}
          MESH_ENDPOINT: ${{ secrets.MESH_ENDPOINT }}
          M247_BASE_URL: ${{ secrets.M247_BASE_URL }}
          M247_COMMERCE_CONSUMER_KEY: ${{ secrets.M247_COMMERCE_CONSUMER_KEY }}
          M247_COMMERCE_CONSUMER_SECRET: ${{ secrets.M247_COMMERCE_CONSUMER_SECRET }}
          M247_COMMERCE_ACCESS_TOKEN: ${{ secrets.M247_COMMERCE_ACCESS_TOKEN }}
          M247_COMMERCE_ACCESS_TOKEN_SECRET: ${{ secrets.M247_COMMERCE_ACCESS_TOKEN_SECRET }}
          NEW_RELIC_LICENSE_KEY: ${{ secrets.NEW_RELIC_LICENSE_KEY }}
          OBSERVABILITY_WEB_ACTION_URL: ${{ secrets.OBSERVABILITY_WEB_ACTION_URL }}
